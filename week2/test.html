<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing123</title>
    <style>
        body {
            background-color: rgb(243, 255, 225);
        }

        h1 {
            color: rgb(243, 146, 162);
            font-family: 'Arial', sans-serif;
            text-align: center;
            text-decoration: underline;
            text-shadow: 2px 2px 4px rgba(211, 15, 15, 0.5);
            font-size: 50px;

        }

        p {
            color: rgb(26, 27, 73);
            border: 5px solid rgb(119, 120, 161);
            border-radius: 10px;
            background-color: rgb(204, 217, 246);
            padding: 10px;
            font-family: 'Arial', sans-serif;
            font-size: 20px;
            padding: 20px;
            margin: 50px;
        }

        .princetitle {
            text-decoration: none;
            color: rgb(86, 88, 208);
            text-shadow: none
        }

        img {
            margin: auto;
            /*centering the image*/
            display: block;
            /*making the image to non sharing space*/
        }
    </style>
</head>

<body>
    <img src="image/princess.png" width="150" alt="Prince">
    <h1>Princess</h1>
    <p>Once upon a time, there was a beautiful princess who lived in a castle.</p>
    <img src="image/prince.png" width="200" alt="Prince">
    <h1 class="princetitle">Prince</h1>
    <p>One day, a brave prince came to the castle and asked for the princess's hand in marriage.</p>


</body>

</html>
