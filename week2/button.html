<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        button.request {
            background-color: black;
            color: white;
            padding: 10px 20px;
            border: none
        }

        button.signup {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;

        }

        button.add-to-cart {
            background-color: #f9da4e;
            color: rgb(0, 0, 0);
            padding: 10px 60px;
            border-radius: 30px;
            border: none;
        }

        button.started {
            background-color: #7353ad;
            color: rgb(255, 255, 255);
            padding: 10px 20px;
            border-radius: 3px;
            border: none;
        }

        button.download {
            background-color: #ffffff;
            color: rgb(0, 0, 0);
            padding: 8px 20px;
            border-radius: 3px;
            border: 1px solid #000000;
        }

        button.company.website {
            background-color: #2d65bc;
            color: rgb(255, 255, 255);
            padding: 10px 30px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
        }

        button.save {
            background-color: #ffffff;
            color: rgb(56, 104, 192);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #3868c0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="signup">Sign up</button>
    <button class="add-to-cart">Add to Cart</button>
    <br><br>
    <button class="started">Get Started</button>
    <button class="download">Download</button>
    <button class="company website">Apply on company website</button>
    <button class="save">Save</button>
</body>

</html>
