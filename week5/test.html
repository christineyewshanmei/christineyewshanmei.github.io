<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        #main {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #main div {
            width: calc(100%/4 - 7.5px);
            height: 50px;
            background-color: aquamarine;
            border: 1px solid;
            padding: 10px;
        }

        @media screen and (max-width: 600px) {
            #main div {
                width: calc(100%/2);
            }
        }
    </style>
</head>

<body>
    <h1>The flex-wrap Property</h1>
    <div id="main">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
    </div>
</body>

</html>
