<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: "oxygen", sans-serif;
            margin-left: 20px;
            margin-right: 20px;
            font-size: 14px;
        }

        .phone {
            align-content: center;
            font-weight: bold;

        }

        .menu {
            display: flex;
            gap: 30px;

            .services {
                color: #FF5A36;
            }
        }



        .phone {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px;
        }

        .hamburger {
            margin: 12px;
        }


        .contact {
            display: flex;
            align-items: center;
        }

        .button {
            background-color: #FF5A36;
            color: rgb(255, 255, 255);
            padding: 10px 18px;
            border-radius: 8px;
            border: none;

        }

        @media screen and (max-width: 1014px) {
            .menu {
                display: none;
            }
        }

        @media screen and (max-width: 1014px) {
            .button {
                display: none;
            }
        }

        @media screen and (min-width: 1015px) {
            .hamburger {
                display: none;
            }
        }

        @media screen and (max-width: 500px) {
            .phone {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <div><img src="images/logo.jpg" width="150px" alt="logo"> </div>
        </div>
        <div class="menu">
            <div class="home">Home</div>
            <div class="services">Services</div>
            <div class="work">Work</div>
            <div class="project-details">Project Details</div>
            <div class="contact">Contact</div>
        </div>
        <div class="contact">
            <div class="phone">
                <div>
                    <img src="images/phone.jpg" width="22px" alt="phone">
                </div>
                <div>555-123-4567</div>
            </div>

            <button class="button">Contact</button>
            <div class="hamburger">
                <img src="images/hamburger.jpg" width="22px" alt="hamburger">
            </div>
        </div>

    </div>


</body>

</html>
