<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');


        body {
            background-color: rgb(227, 227, 227);
        }

        .item {
            display: flex;
            justify-content: center;
            gap: 35px;
            max-width: 1024px;
            margin: 0 auto;
        }

        .project {
            background-color: rgb(255, 255, 255);
            padding: 15px;
            border-radius: 15px;
        }

        img {
            border-radius: 12px;
        }

        p {
            color: rgb(91, 91, 91);
            margin: 10px;
            line-height: 1.5;
            font-family: "oxygen", sans-serif;
            font-size: 15px;

        }

        h3 {
            font-family: "Oxygen", sans-serif;
            font-size: 21px;
            margin-left: 10px;
            line-height: 13px;
        }
    </style>

</head>

<body>
    <div class="item">
        <div class="project">
            <img src="images/residential.jpg" width="100%">
            <h3>Residential projects</h3>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="project">
            <img src="images/commercial.jpg" width="100%">
            <h3>Commericial spaces</h3>
            <p>We create efficient, inspiring workspaces for businessess of all sizes.</p>
        </div>
        <div class="project">
            <img src="images/infrastructure.jpg" width="100%">
            <h3>Infrastructure works</h3>
            <p>We develop strong, reliable infrastructure for growing communities.</p>
        </div>

    </div>
</body>

</html>
