<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <style>
        .container {
            width: 85%;
            margin: 0 auto;
        }

        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            gap: 10;
            align-items: center;

        }


        .header {
            display: flex;
            gap: 50px;
            align-items: center;
            font-size: 18px;
        }

        .request {
            background-color: #ffffff;
            color: rgb(0, 0, 0);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #000000;

        }

        .about {
            display: flex;
            align-items: space-between;
            align-items: center;
            margin-top: 30px;

        }

        h1 {
            justify-content: center;
            align-items: center;
            font-size: 60px;

        }

        p {
            margin-top: 30px;
            justify-content: center;
            font-size: 20px;

        }



        .booking {
            background-color: #000000;
            color: rgb(255, 255, 255);
            padding: 9px 23px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body>


    <div class="container">
        <div class="bar">
            <div class="logo">
                <h2>Positivus</h2>
            </div>
            <div class="header">
                <div>About us</div>
                <div>Services</div>
                <div>Use Cases</div>
                <div>Pricing</div>
                <div>Blog</div>
                <button class="request">Request a quote</button>
            </div>
        </div>




        <div class="about">
            <div>
                <h1>Navigating the digital landscape for success</h1>
                <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including
                    SEO, PPC, social media marketing, and content creation</p>
                <button class="booking">Book a consultation</button>
            </div>
            <div class="photo">
                <img src="images/speaker.png" width="100%" alt="speaker">
            </div>
        </div>
    </div>








</body>

</html>
