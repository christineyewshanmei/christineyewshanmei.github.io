<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <style>
        .logo {
            display: flex;
            max-width: 1024px;
            font-size: 30px;
            gap: 100px;
            justify-content: center;
            align-items: center;
        }

        .header {
            display: flex;
            gap: 32px;
            align-items: center;
            font-size: 20px;

        }

        .request {

            background-color: #ffffff;
            color: rgb(0, 0, 0);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #000000;
            align-items: center;
        }

        .about {
            display: flex;
            flex-direction: row
        }



        .booking {
            background-color: #000000;
            color: rgb(255, 255, 255);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #000000;
        }
    </style>
</head>

<body>

    <div class="logo">
        <div>Positivus</div>
        <div class="header">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <button class="request">Request a quote</button>
        </div>
    </div>


    <div calss="about">
        <div class="navigating">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including
                SEO, PPC, social media marketing, and content creation</p>
            <button class="booking">Book a consultation</button>
        </div>
        <div class="photo">
            <img src="images/speaker.png" width="190" alt="speaker">
        </div>
    </div>








</body>

</html>
