<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <style>
        .container {
            width: 90%;
            margin: 0 auto;
            max-width: 1300px;
        }

        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        h2 {
            margin-left: 8px;
            font-size: 30px;
        }


        .header {
            display: flex;
            gap: 40px;
            align-items: center;
            font-size: 20px;
        }

        .request {
            background-color: #ffffff;
            color: rgb(0, 0, 0);
            padding: 20px 35px;
            border-radius: 8px;
            border: 1px solid #000000;
            font-size: 20px;
        }

        .about {
            display: flex;
            align-items: center;
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 20px;
            line-height: 28px;
            margin-top: 35px;
        }

        .booking {
            background-color: #000000;
            color: rgb(255, 255, 255);
            padding: 20px 30px;
            border-radius: 8px;
            margin-top: 35px;
            gap: 30px;
            font-size: 20px;
        }

        .photo {
            margin-left: 95px;
            margin-top: 20px;
        }

        .company {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 60px;
        }
    </style>
</head>

<body>


    <div class="container">
        <div class="bar">
            <div class="logo">
                <img src="images/icon.jpg" width="25px" alt="icon">
                <h2>Positivus</h2>
            </div>
            <div class="header">
                <div>About us</div>
                <div>Services</div>
                <div>Use Cases</div>
                <div>Pricing</div>
                <div>Blog</div>
                <button class="request">Request a quote</button>
            </div>
        </div>




        <div class="about">
            <div class="content">
                <h1>Navigating the digital landscape for success</h1>
                <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including
                    SEO, PPC, social media marketing, and content creation</p>
                <button class="booking">Book a consultation</button>
            </div>
            <div class="photo">
                <img src="images/speaker.png" width="600px" alt="speaker">
            </div>
        </div>

        <div class="company">
            <div>
                <img src="images/amazon.jpg">
            </div>
            <div>
                <img src="images/drillle.jpg">
            </div>
            <div>
                <img src="images/hubspot.jpg">
            </div>
            <div>
                <img src="images/notion.jpg">
            </div>
            <div>
                <img src="images/netflix.jpg">
            </div>
            <div>
                <img src="images/zoom.jpg">
            </div>
        </div>
    </div>


</body>

</html>
