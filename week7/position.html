<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            background: linear-gradient(to bottom, #01054C, #0010D5);
        }

        p {
            font-family: "Prompt", sans-serif;
            font-weight: 500;
        }

        h2 {
            font-family: "Prompt", sans-serif;
            font-weight: 600;
        }

        .man {
            width: 500px;
            margin: auto;
            position: relative;
        }

        .manimage {
            width: 100%;
        }

        .left {
            background-color: #CAEC01;
            padding: 8px 20px;
            width: 200px;
            border-radius: 6px;
            position: absolute;
            bottom: 30px;
            right: 80%;

            p {
                margin-top: 5px;
            }

            h2 {
                font-size: 50px;
                margin-bottom: 0px;
                margin-top: 10px;
            }

            hr {
                width: 85%;
                margin-left: 0;
                margin-right: auto;
                height: 2px;
                background-color: #000000;
                border: none;
                margin-top: 15px;
                margin-bottom: 20px;
            }

        }

        .right {
            background-color: white;
            padding: 8px 20px;
            border-radius: 6px;
            position: absolute;
            bottom: 350px;
            left: 400px;

            .topright {
                display: flex;
                gap: 10px;
                align-items: center;
                margin-top: 12px;

                h2 {
                    margin: 0px;
                    font-size: 50px;
                }
            }

            hr {
                height: 10px;
                background-color: #CAEC01;
                border: none;
                border-radius: 10px;
                margin-top: 10px;
            }

            p {
                margin: 5px;
            }
        }

        .arrow {
            height: 40px;
        }

        @media (max-width: 809px) {
            .left {
                right: 280px;
                bottom: 30px;
            }

            .right {
                left: 280px;
                bottom: 350px;
            }
        }
    </style>
</head>

<body>
    <div class="man">
        <img class="manimage" src="images/workingman.jpg">
        <div class="left">
            <h2>20+</h2>
            <hr>
            <p>Years of experience</p>
        </div>

        <div class="right">
            <div class="topright">
                <h2>87.2%</h2>
                <img class="arrow" src="images/toparrows.png">
            </div>
            <hr>
            <p>Revenue growth</p>
        </div>
    </div>
</body>

</html>
